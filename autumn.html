<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Autumn Light</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="IMG/logo-modif.svg">
    </head>
    <body>
        <header class="logo-pg-annexe">
            <img class="icon-gallery" src="IMG/logo-modif.png">
            <p><a href="index.html" class="retour">Retour à la galerie</a></p>
        </header>
        <h1 class="h1-pg-annexe">Autumn Light</h1>
        <main class="galerie-container">
            <img src="IMG/AutumnLight/al1.png" alt="Photo Autumn 1" class="galerie-img">
            <img src="IMG/AutumnLight/al2.png" alt="Photo Autumn 2" class="galerie-img">
            <img src="IMG/AutumnLight/al3.png" alt="Photo Autumn 3" class="galerie-img">
            <img src="IMG/AutumnLight/al4.png" alt="Photo Autumn 4" class="galerie-img">
            <img src="IMG/AutumnLight/al5.png" alt="Photo Autumn 5" class="galerie-img">
        </main>
        <div class="lightbox" id="lightbox">
            <span class="close" id="closeLightbox">&times;</span>
            <img src="" alt="Image agrandie" id="lightboxImg">
        </div>
        <script src="script.js"></script>
    </body>
</html>
